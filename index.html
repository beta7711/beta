<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贝塔导航</title>
<style>
  :root {
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
    --bg: #ffffff;
    --section-bg: #f5f5f7;
    --nav-bg: rgba(29,29,31,0.92);
    --nav-text: rgba(255,255,255,0.8);
    --blue: #0071e3;
    --blue-hover: #0077ed;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
    --card-hover-shadow: 0 8px 24px rgba(0,0,0,0.1);
    --border: rgba(0,0,0,0.06);
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 22px;
    --transition: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══ Navigation (Apple-style dark bar) ═══ */
  .nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    height: 44px;
    background: var(--nav-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1024px; width: 100%; padding: 0 22px;
  }
  .nav-logo {
    font-size: 17px; font-weight: 600; color: #fff;
    letter-spacing: -0.3px; text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-logo-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue);
  }
  .nav-search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 5px 14px; width: 240px;
    transition: all var(--transition);
  }
  .nav-search-wrap:focus-within {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.25);
  }
  .nav-search-wrap svg { color: rgba(255,255,255,0.5); flex-shrink: 0; }
  .nav-search-wrap input {
    flex: 1; background: none; border: none;
    color: #fff; font-size: 13px; padding: 4px 0;
    outline: none; font-family: inherit; caret-color: var(--blue);
  }
  .nav-search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
  .nav-count { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }

  /* ═══ Category bar (Apple-style thin tabs) ═══ */
  .cat-bar {
    position: sticky; top: 44px; z-index: 50;
    height: 52px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .cat-bar-inner {
    display: flex; align-items: center; gap: 0;
    max-width: 1024px; width: 100%;
    padding: 0 22px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .cat-bar-inner::-webkit-scrollbar { height: 0; }

  .cat-tab {
    position: relative;
    padding: 14px 16px;
    font-size: 12px; font-weight: 400;
    color: var(--text-secondary);
    white-space: nowrap; cursor: pointer;
    transition: color var(--transition);
    letter-spacing: -0.08px;
    display: flex; align-items: center; gap: 4px;
    background: none; border: none; font-family: inherit;
  }
  .cat-tab::after {
    content: '';
    position: absolute; bottom: 8px; left: 16px; right: 16px;
    height: 1.5px;
    background: var(--text);
    transform: scaleX(0);
    transition: transform var(--transition);
  }
  .cat-tab:hover { color: var(--text); }
  .cat-tab.active { color: var(--text); font-weight: 500; }
  .cat-tab.active::after { transform: scaleX(1); }
  .cat-tab .tab-num {
    font-size: 10px; color: var(--text-tertiary);
    font-weight: 400;
  }
  .cat-tab.active .tab-num { color: var(--text-secondary); }

  /* ═══ Main content ═══ */
  .main-content {
    max-width: 980px; margin: 0 auto;
    padding: 0 22px 100px;
  }

  /* ═══ Hero ═══ */
  .hero {
    text-align: center; padding: 80px 0 72px;
    animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .hero .label {
    display: inline-block;
    font-size: 14px; font-weight: 500; color: var(--blue);
    margin-bottom: 18px;
    letter-spacing: 0;
  }
  .hero h1 {
    font-size: clamp(44px, 8vw, 80px); font-weight: 700;
    letter-spacing: -2px; line-height: 1.06;
    margin-bottom: 16px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(180deg, #0071e3 0%, #5e5ce6 50%, #ac39ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero .sub {
    font-size: 21px; color: var(--text-secondary);
    font-weight: 400; letter-spacing: -0.3px;
    line-height: 1.4; max-width: 520px; margin: 0 auto;
  }
  .hero-nums {
    display: flex; justify-content: center; gap: 60px;
    margin-top: 44px;
  }
  .hero-num { text-align: center; }
  .hero-num .n {
    font-size: 44px; font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(180deg, var(--blue), #5e5ce6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .hero-num .l {
    font-size: 12px; color: var(--text-secondary);
    font-weight: 400; margin-top: 4px;
  }

  /* ═══ AI Column ═══ */
  .sec-head {
    text-align: center; margin-bottom: 40px;
  }
  .sec-head .sec-icon { font-size: 36px; margin-bottom: 8px; }
  .sec-head h2 { font-size: 32px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 6px; }
  .sec-head p { font-size: 17px; color: var(--text-secondary); letter-spacing: -0.2px; }

  .ai-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 80px;
  }
  .ai-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--card-shadow);
    transition: all var(--transition);
    opacity: 0; transform: translateY(20px);
  }
  .ai-card.visible { opacity: 1; transform: translateY(0); }
  .ai-card:hover {
    box-shadow: var(--card-hover-shadow);
    transform: translateY(-4px);
    border-color: rgba(0,0,0,0.12);
  }
  .ai-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .ai-card-icon { font-size: 24px; }
  .ai-card-head h4 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .ai-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ai-tag {
    display: inline-block;
    font-size: 12px; color: var(--text-secondary);
    background: #f5f5f7; border-radius: 6px;
    padding: 5px 10px; text-decoration: none;
    transition: all var(--transition);
  }
  .ai-tag:hover { background: var(--blue); color: #fff; }

  /* ═══ Category Section ═══ */
  .cat-section {
    margin-bottom: 80px;
    scroll-margin-top: 110px;
    opacity: 0; transform: translateY(30px);
    transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .cat-section.visible { opacity: 1; transform: translateY(0); }

  .cat-sec-head {
    text-align: center; margin-bottom: 32px;
  }
  .cat-sec-icon { font-size: 36px; margin-bottom: 8px; }
  .cat-sec-sub { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .cat-sec-sub h4 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .cat-sec-head h3 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .cat-sec-head p { font-size: 15px; color: var(--text-secondary); margin-top: 4px; max-width: 480px; margin-left: auto; margin-right: auto; }

  /* ═══ Bookmark grid ═══ */
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
  }
  .bookmark-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer; text-decoration: none; color: inherit;
    display: flex; align-items: flex-start; gap: 12px;
    box-shadow: var(--card-shadow);
    transition: all var(--transition);
    opacity: 0; transform: translateY(16px);
  }
  .bookmark-card.visible { opacity: 1; transform: translateY(0); }
  .bookmark-card:hover {
    box-shadow: var(--card-hover-shadow);
    transform: translateY(-3px);
    border-color: rgba(0,0,0,0.15);
  }
  .card-favicon {
    width: 40px; height: 40px; border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #f5f5f7; overflow: hidden; position: relative;
  }
  .card-favicon img { width: 22px; height: 22px; position: relative; z-index: 1; }
  .card-favicon .fb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; z-index: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 13px; font-weight: 600; letter-spacing: -0.1px;
    line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 2px;
  }
  .card-desc {
    font-size: 12px; color: var(--text-secondary); line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 4px;
  }
  .card-url {
    font-size: 11px; color: var(--text-tertiary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-arr {
    opacity: 0; transition: all var(--transition);
    flex-shrink: 0; margin-top: 2px;
    color: var(--text-tertiary);
  }
  .bookmark-card:hover .card-arr { opacity: 1; color: var(--blue); }

  /* ═══ View more ═══ */
  .more-wrap { text-align: center; margin-top: 20px; }
  .more-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 14px; color: var(--blue); cursor: pointer;
    text-decoration: none;
    transition: all var(--transition);
  }
  .more-btn:hover { text-decoration: underline; }

  /* ═══ Search ═══ */
  .search-head {
    text-align: center; padding: 30px 0 36px;
  }
  .search-head h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .search-head .q { color: var(--blue); }
  .search-head p { color: var(--text-secondary); font-size: 15px; }

  /* ═══ Empty ═══ */
  .empty-state { text-align: center; padding: 100px 20px; color: var(--text-secondary); }
  .empty-state .ei { font-size: 56px; margin-bottom: 20px; opacity: 0.2; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 4px; }

  /* ═══ Footer ═══ */
  footer {
    text-align: center; padding: 26px 20px;
    color: var(--text-tertiary); font-size: 11px;
    border-top: 1px solid var(--border);
  }

  /* ═══ Responsive ═══ */
  @media (max-width: 768px) {
    .nav-inner { padding: 0 16px; }
    .nav-logo { font-size: 15px; }
    .nav-search-wrap { width: 150px; padding: 4px 10px; }
    .nav-count { display: none; }
    .cat-bar-inner { padding: 0 16px; }
    .cat-tab { padding: 14px 10px; font-size: 11px; }
    .cat-tab::after { left: 10px; right: 10px; }
    .main-content { padding: 0 16px 80px; }
    .hero { padding: 60px 0 48px; }
    .hero h1 { font-size: 32px; letter-spacing: -1px; }
    .hero .sub { font-size: 17px; }
    .hero-nums { gap: 32px; }
    .hero-num .n { font-size: 30px; }
    .ai-grid { grid-template-columns: 1fr; }
    .bookmark-grid { grid-template-columns: 1fr; }
    .sec-head h2 { font-size: 24px; }
    .cat-sec-head h3 { font-size: 22px; }
  }
</style>
</head>
