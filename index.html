<style>
  :root {
    --bg: #08080c;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.06);
    --text: #f0f0f5;
    --text-secondary: #8b8b9e;
    --text-muted: #5b5b6e;
    --accent-1: #a78bfa;
    --accent-2: #60a5fa;
    --accent-3: #f472b6;
    --accent-4: #34d399;
    --accent-5: #fbbf24;
    --accent-6: #fb923c;
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 24px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Ambient background ─── */
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(120px);
    opacity: 0.12; pointer-events: none; z-index: 0;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orb-1 { width: 600px; height: 600px; background: var(--accent-1); top: -200px; right: -100px; animation-delay: 0s; }
  .bg-orb-2 { width: 500px; height: 500px; background: var(--accent-2); bottom: -150px; left: -150px; animation-delay: -7s; }
  .bg-orb-3 { width: 400px; height: 400px; background: var(--accent-3); top: 50%; left: 50%; animation-delay: -14s; opacity: 0.06; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(80px, -60px) scale(1.08); }
    50% { transform: translate(-40px, 40px) scale(0.95); }
    75% { transform: translate(-60px, -30px) scale(1.05); }
  }

  /* ─── Nav ─── */
  nav {
    position: fixed; top: 0; width: 100%;
    z-index: 100;
    padding: 16px 40px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(8,8,12,0.65);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .logo {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-1);
  }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px; padding: 0 18px;
    width: 300px; transition: all var(--transition);
  }
  .nav-search:focus-within {
    border-color: rgba(167,139,250,0.4);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
  }
  .nav-search svg { color: var(--text-muted); flex-shrink: 0; }
  .nav-search input {
    flex: 1; background: none; border: none;
    color: var(--text); font-size: 13px;
    padding: 10px 0; outline: none; font-family: inherit;
  }
  .nav-search input::placeholder { color: var(--text-muted); }
  .nav-info { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .nav-info em { font-style: normal; color: var(--text-secondary); }

  /* ─── Hero ─── */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 140px 40px 60px;
    animation: fadeUp 0.8s ease forwards;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px;
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 50px;
    font-size: 12px; color: var(--accent-1);
    margin-bottom: 24px;
  }
  .hero .eyebrow .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-1);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.8); }
  }

  .hero h1 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
  .hero h1 .hl {
    background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 40%, var(--accent-3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: gradientShift 4s ease infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% center; }
    50% { background-position: 100% center; }
  }
  .hero p { font-size: 16px; color: var(--text-secondary); max-width: 520px; margin: 0 auto; line-height: 1.6; }

  /* ─── Stats pills ─── */
  .hero-stats {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 32px; flex-wrap: wrap;
  }
  .hero-stat {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 20px;
    transition: all var(--transition);
  }
  .hero-stat:hover { background: var(--surface-hover); border-color: rgba(167,139,250,0.2); }
  .hero-stat .val {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-stat .lbl { font-size: 12px; color: var(--text-muted); }

  /* ─── Category pills ─── */
  .cat-nav {
    position: sticky; top: 68px; z-index: 50;
    padding: 14px 0;
    background: rgba(8,8,12,0.6);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .cat-nav-inner {
    display: flex; gap: 8px; padding: 0 40px;
    overflow-x: auto; scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .cat-nav-inner::-webkit-scrollbar { height: 0; }
  .cat-pill {
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 12px; font-weight: 500;
    white-space: nowrap; cursor: pointer; user-select: none;
    transition: all var(--transition);
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
    flex-shrink: 0;
  }
  .cat-pill:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
  .cat-pill.active {
    color: #fff;
    background: rgba(167,139,250,0.12);
    border-color: rgba(167,139,250,0.25);
  }
  .cat-pill .pill-count {
    font-size: 10px; opacity: 0.5;
  }
  .cat-pill.active .pill-count { opacity: 0.8; color: var(--accent-1); }

  /* ─── Main content ─── */
  .main-content {
    position: relative; z-index: 1;
    padding: 0 40px 80px;
    max-width: 1400px; margin: 0 auto;
  }

  /* ─── Category section ─── */
  .cat-section {
    margin-bottom: 64px;
    scroll-margin-top: 130px;
  }
  .cat-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
  }
  .cat-icon-box {
    width: 44px; height: 44px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .cat-header h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .cat-header .cat-desc {
    font-size: 13px; color: var(--text-muted);
    margin-left: 4px;
  }
  .cat-count-badge {
    margin-left: auto;
    font-size: 12px; color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    padding: 4px 12px; border-radius: 50px;
  }

  /* ─── Bento-style bookmark grid ─── */
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }

  .bookmark-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: flex-start; gap: 12px;
    text-decoration: none; color: inherit;
    opacity: 0; transform: translateY(24px);
    overflow: hidden;
  }
  .bookmark-card.visible {
    opacity: 1; transform: translateY(0);
  }
  .bookmark-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(167,139,250,0.06), transparent 40%);
    opacity: 0; transition: opacity 0.3s;
  }
  .bookmark-card:hover::before { opacity: 1; }
  .bookmark-card:hover {
    background: var(--surface-hover);
    border-color: rgba(167,139,250,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .bookmark-card:hover .card-arrow { opacity: 1; transform: translate(0, 0); }

  /* ─── Favicon ─── */
  .card-icon {
    width: 42px; height: 42px; border-radius: 12px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-icon img {
    width: 24px; height: 24px;
    position: relative; z-index: 1;
    border-radius: 4px;
  }
  .card-icon .fb-letter {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
    z-index: 0;
  }

  /* ─── Card text ─── */
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px; font-weight: 600; line-height: 1.3;
    letter-spacing: -0.1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 2px;
  }
  .card-desc {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 6px;
  }
  .card-domain {
    font-size: 11px; color: var(--text-muted);
    opacity: 0.6;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .card-domain::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    flex-shrink: 0;
  }

  .card-arrow {
    color: var(--text-muted);
    opacity: 0;
    transform: translate(4px, -4px);
    transition: all 0.25s ease;
    flex-shrink: 0; margin-top: 2px;
  }

  /* ─── View more ─── */
  .view-more {
    text-align: center; margin-top: 16px;
  }
  .view-more-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 13px; color: var(--accent-1);
    cursor: pointer;
    background: rgba(167,139,250,0.06);
    border: 1px solid rgba(167,139,250,0.12);
    transition: all var(--transition);
  }
  .view-more-btn:hover {
    background: rgba(167,139,250,0.12);
    border-color: rgba(167,139,250,0.25);
  }

  /* ─── Search results ─── */
  .search-result-header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .search-result-header h2 {
    font-size: 22px; font-weight: 700;
    margin-bottom: 6px;
  }
  .search-result-header .query-hl {
    color: var(--accent-1);
  }

  /* ─── Empty state ─── */
  .empty-state {
    text-align: center; padding: 100px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon {
    font-size: 56px; margin-bottom: 20px; opacity: 0.3;
  }
  .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* ─── Footer ─── */
  footer {
    text-align: center; padding: 32px 20px;
    color: var(--text-muted); font-size: 12px;
    border-top: 1px solid rgba(255,255,255,0.03);
    position: relative; z-index: 1;
  }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    nav { padding: 12px 16px; }
    .nav-search { width: 180px; padding: 0 14px; }
    .nav-info { display: none; }
    .logo { font-size: 17px; }
    .hero { padding: 120px 20px 40px; }
    .hero h1 { font-size: 28px; }
    .cat-nav-inner { padding: 0 16px; }
    .main-content { padding: 0 16px 60px; }
    .bookmark-grid { grid-template-columns: 1fr; }
    .cat-header { flex-wrap: wrap; }
  }
</style>
</head>

<script>
(function() {
  var ICONS = {
    'AI平台与对话': '🤖', 'AI图像与设计': '🎨',
    '视频与音频工具': '🎬', '文案与内容创作': '✏️',

    '游戏与娱乐': '🎮', '生活与购物': '🛒',
  };

  var ICON_COLORS = {
    'AI平台与对话': '#a78bfa', 'AI图像与设计': '#f472b6',
    '视频与音频工具': '#60a5fa', '文案与内容创作': '#34d399',
    '设计素材与资源': '#fbbf24', '效率与系统工具': '#fb923c',
    '数据与营销推广': '#a78bfa', '学习与教程': '#60a5fa',
    '游戏与娱乐': '#f472b6', '生活与购物': '#34d399',
  };

  var LETTER_COLORS = ['#a78bfa','#60a5fa','#f472b6','#34d399','#fbbf24','#fb923c','#c084fc','#818cf8'];

  function catIcon(name) { return ICONS[name] || '🔗'; }
  function catColor(name) { return ICON_COLORS[name] || '#a78bfa'; }

  // ─── Data ───
  var flatItems = [];
  var categories = [];
  for (var i = 0; i < BOOKMARK_DATA.length; i++) {
    var cat = BOOKMARK_DATA[i];
    categories.push(cat);
    for (var j = 0; j < cat.children.length; j++) {
      flatItems.push({ category: cat.name, item: cat.children[j] });
    }
  }
  var activeCategory = null;

  // ─── Helpers ───
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  function domain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }

  function faviconUrl(url) {
    try { return 'https://www.google.com/s2/favicons?domain=' + new URL(url).hostname + '&sz=64'; }
    catch { return ''; }
  }

  function firstChar(name) {
    var m = name.trim().match(/[一-鿿]/);
    if (m) return m[0];
    m = name.trim().match(/[a-zA-Z]/);
    if (m) return m[0].toUpperCase();
    return name.trim().charAt(0).toUpperCase();
  }

  function cardHTML(item, idx, accentColor) {
    var d = domain(item.href);
    var desc = item.desc || '';
    var letter = firstChar(item.name);
    var letterColor = LETTER_COLORS[(item.name.charCodeAt(0) || 0) % LETTER_COLORS.length];
    var bg = accentColor + '15';

    return '<a class="bookmark-card" style="transition-delay:' + (idx % 20) * 0.03 + 's"'
      + ' href="' + esc(item.href) + '" target="_blank" rel="noopener"'
      + ' title="' + esc(item.name) + (desc ? ' &#10;' + esc(desc) : '') + '">'
      + '<div class="card-icon" style="background:' + bg + '">'
      + '<img src="' + faviconUrl(item.href) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      + '<span class="fb-letter" style="color:' + letterColor + '">' + esc(letter) + '</span>'
      + '</div>'
      + '<div class="card-body">'
      + '<div class="card-title">' + esc(item.name) + '</div>'
      + (desc ? '<div class="card-desc">' + esc(desc) + '</div>' : '')
      + '<div class="card-domain">' + esc(d) + '</div>'
      + '</div>'
      + '<svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>'
      + '</a>';
  }

  // ─── Category Pills ───
  var catNavInner = document.getElementById('catNavInner');

  function renderPills() {
    var h = '<span class="cat-pill' + (activeCategory === null ? ' active' : '') + '" data-cat="">全部<span class="pill-count">' + flatItems.length + '</span></span>';
    for (var i = 0; i < categories.length; i++) {
      var cat = categories[i];
      h += '<span class="cat-pill' + (activeCategory === cat.name ? ' active' : '') + '" data-cat="' + esc(cat.name) + '">' + catIcon(cat.name) + ' ' + esc(cat.name) + '<span class="pill-count">' + cat.children.length + '</span></span>';
    }
    catNavInner.innerHTML = h;
    catNavInner.querySelectorAll('.cat-pill').forEach(function(el) {
      el.addEventListener('click', function() {
        selectCategory(this.dataset.cat || null);
      });
    });
  }

  function selectCategory(name) {
    activeCategory = name;
    renderPills();
    document.getElementById('searchInput').value = '';
    renderContent();
    if (name) {
      setTimeout(function() {
        var el = document.getElementById('cat-' + name);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    } else {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ─── Content ───
  var mainContent = document.getElementById('mainContent');
  var navInfo = document.getElementById('navInfo');

  function renderContent() {
    var query = document.getElementById('searchInput').value.trim().toLowerCase();
    var h = '';
    var count = 0;

    if (query) {
      var results = [];
      for (var i = 0; i < flatItems.length; i++) {
        var fi = flatItems[i];
        var t = (fi.item.name + ' ' + (fi.item.desc || '') + ' ' + fi.item.href + ' ' + fi.category).toLowerCase();
        if (t.indexOf(query) !== -1) results.push(fi);
      }
      count = results.length;
      h += '<div class="search-result-header"><h2>搜索 <span class="query-hl">"' + esc(query) + '"</span></h2><p style="color:var(--text-muted);font-size:14px">找到 ' + count + ' 个结果</p></div>';
      if (count > 0) {
        h += '<div class="bookmark-grid">';
        for (var r = 0; r < results.length; r++) h += cardHTML(results[r].item, r, '#a78bfa');
        h += '</div>';
      }
    } else if (activeCategory) {
      var cat = null;
      for (var c = 0; c < categories.length; c++) {
        if (categories[c].name === activeCategory) { cat = categories[c]; break; }
      }
      if (cat) {
        count = cat.children.length;
        h += renderSection(cat, 0, true);
      }
    } else {
      // Full page with all categories
      h += '<div class="hero">';
      h += '<div class="eyebrow"><span class="pulse"></span>持续更新中</div>';
      h += '<h1>贝塔<span class="hl">导航</span></h1>';
      h += '<p>精选 ' + flatItems.length + ' 个值得收藏的网站，分 ' + categories.length + ' 个主题整理，持续更新中的互联网工具箱</p>';
      h += '<div class="hero-stats">';
      h += '<div class="hero-stat"><span class="val">' + flatItems.length + '</span><span class="lbl">精选书签</span></div>';
      h += '<div class="hero-stat"><span class="val">' + categories.length + '</span><span class="lbl">分类主题</span></div>';
      h += '<div class="hero-stat"><span class="val">2026</span><span class="lbl">持续维护</span></div>';
      h += '</div></div>';

      count = flatItems.length;
      var idx = 0;
      for (var d = 0; d < categories.length; d++) {
        var limit = 24;
        h += renderSection(categories[d], idx, false, limit);
        idx += Math.min(categories[d].children.length, limit);
      }
    }

    navInfo.innerHTML = '<em>' + count + '</em> 个书签';

    if (count === 0 && query) {
      mainContent.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>没有找到</h3><p>试试其他关键词？</p></div>';
    } else {
      mainContent.innerHTML = h;
      observeCards();
      observeSections();
    }
  }

  function renderSection(cat, startIdx, showAll, limit) {
    var links = showAll ? cat.children : cat.children.slice(0, limit || 24);
    var more = !showAll && cat.children.length > (limit || 24) ? cat.children.length - (limit || 24) : 0;
    var color = catColor(cat.name);

    var h = '<div class="cat-section" id="cat-' + esc(cat.name) + '">';
    h += '<div class="cat-header">';
    h += '<div class="cat-icon-box" style="background:' + color + '15;border-color:' + color + '20">' + catIcon(cat.name) + '</div>';
    h += '<div>';
    h += '<h3>' + esc(cat.name) + '</h3>';
    if (cat.description) h += '<span class="cat-desc">' + esc(cat.description) + '</span>';
    h += '</div>';
    h += '<span class="cat-count-badge">' + cat.children.length + '</span>';
    h += '</div>';
    h += '<div class="bookmark-grid">';
    for (var i = 0; i < links.length; i++) {
      h += cardHTML(links[i], startIdx + i, color);
    }
    h += '</div>';
    if (more > 0) {
      h += '<div class="view-more"><span class="view-more-btn" onclick="(function(){document.querySelector(\'.cat-pill[data-cat=\\\'' + esc(cat.name) + '\\\']\').click()})()">查看全部 ' + cat.children.length + ' 个 &rarr;</span></div>';
    }
    h += '</div>';
    return h;
  }

  // ─── Intersection observers ───
  function observeCards() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.05, rootMargin: '0px 0px -10px 0px' });
    mainContent.querySelectorAll('.bookmark-card').forEach(function(el) { obs.observe(el); });
  }

  function observeSections() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; } });
    }, { threshold: 0.05 });
    mainContent.querySelectorAll('.cat-section').forEach(function(el) {
      el.style.opacity = '0';
      el.style.transform = 'translateY(30px)';
      el.style.transition = 'all 0.6s cubic-bezier(0.4,0,0.2,1)';
      obs.observe(el);
    });
  }

  // ─── Mouse tracking for card glow ───
  document.addEventListener('mousemove', function(e) {
    mainContent.querySelectorAll('.bookmark-card:hover').forEach(function(card) {
      var rect = card.getBoundingClientRect();
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty('--mouse-x', x + '%');
      card.style.setProperty('--mouse-y', y + '%');
    });
  });

  // ─── Search ───
  document.getElementById('searchInput').addEventListener('input', function() {
    if (this.value.trim()) { activeCategory = null; renderPills(); }
    renderContent();
  });

  // ─── Keyboard shortcut: / to focus search ───
  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== document.getElementById('searchInput') && !e.target.closest('input,textarea,[contenteditable]')) {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('searchInput').blur();
      if (activeCategory !== null) { selectCategory(null); }
    }
  });

  // ─── Init ───
  renderPills();
  renderContent();
})();
</script>
</body>
</html>
