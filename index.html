<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>贝塔导航</title>
<style>
  :root {
    --text: #1d1d1f;
    --text-secondary: #666;
    --text-tertiary: #999;
    --bg: #ffffff;
    --card-bg: #ffffff;
    --border: rgba(0,0,0,0.06);
    --blue: #0071e3;
    --radius: 8px;
    --transition: 0.35s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  a { text-decoration: none; color: inherit; }

  /* ─── Nav ─── */
  .nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    height: 48px;
    background: rgba(29,29,31,0.95);
    backdrop-filter: saturate(180%) blur(20px);
    display: flex; align-items: center;
    padding: 0 36px;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
  }
  .nav-logo { font-size: 17px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
  .nav-search {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 4px 14px; width: 220px; transition: all var(--transition);
  }
  .nav-search:focus-within { background: rgba(255,255,255,0.18); box-shadow: 0 0 0 3px rgba(0,113,227,0.25); }
  .nav-search input {
    flex: 1; background: none; border: none; color: #fff; font-size: 13px;
    padding: 5px 0; outline: none; font-family: inherit; caret-color: var(--blue);
  }
  .nav-search input::placeholder { color: rgba(255,255,255,0.4); }
  .nav-search svg { color: rgba(255,255,255,0.4); flex-shrink: 0; width: 14px; height: 14px; }

  /* ─── Category Tabs ─── */
  .cat-bar {
    position: sticky; top: 48px; z-index: 50;
    background: #f8f8f8; border-bottom: 1px solid #eee;
  }
  .cat-bar-inner {
    display: flex; gap: 0; padding: 0 36px;
    overflow-x: auto; scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .cat-bar-inner::-webkit-scrollbar { height: 0; }
  .cat-tab {
    padding: 13px 18px; font-size: 13px; font-weight: 400;
    color: var(--text-secondary); white-space: nowrap; cursor: pointer;
    transition: all var(--transition); border-bottom: 2px solid transparent;
    background: none; border-top: none; border-left: none; border-right: none; font-family: inherit;
  }
  .cat-tab:hover { color: var(--text); }
  .cat-tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }

  /* ─── Content ─── */
  .main-wrap {
    padding: 28px 36px 60px;
    max-width: 1500px; margin: 0 auto;
  }

  /* ─── Section ─── */
  .cat-section {
    margin-bottom: 48px;
    scroll-margin-top: 120px;
  }
  .sec-title {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; margin-bottom: 14px;
    border-bottom: 1px solid #eee;
  }
  .sec-title .emoji { font-size: 22px; }
  .sec-title h3 { font-size: 18px; font-weight: 700; }
  .sec-title .desc { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }

  /* ─── Grid ─── */
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 14px;
    margin-bottom: 10px;
  }
  @media (max-width: 640px) { .bookmark-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
  @media (max-width: 420px) { .bookmark-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ─── Card ─── */
  .tool { }

  .tool-head { display: block; }
  .tool-img {
    height: 106px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: all 0.4s;
    margin-bottom: 8px;
  }
  .tool-letter {
    font-size: 34px; font-weight: 700;
    background: rgba(255,255,255,0.9);
    border-radius: 8px;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s;
  }
  .tool-img:hover .tool-letter {
    transform: scale(1.12) rotate(8deg);
  }
  .tool-img:hover {
    box-shadow: 0 24px 28px -16px rgba(0,0,0,0.26);
    transform: translateY(-4px);
  }
.tool-title {
    font-size: 14px; font-weight: 700; color: #1d1d1f;
    line-height: 1.3; margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tool-body {
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ─── AI Column ─── */
  .ai-col { margin-bottom: 40px; }
  .ai-col-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; margin-bottom: 14px;
    border-bottom: 1px solid #eee;
  }
  .ai-col-head .emoji { font-size: 22px; }
  .ai-col-head h3 { font-size: 18px; font-weight: 700; }
  .ai-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .ai-card {
    background: #f8f8f8;
    border-radius: 8px;
    padding: 18px 20px;
    transition: all 0.3s;
  }
  .ai-card:hover { background: #f0f0f0; }
  .ai-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-card-icon { font-size: 20px; }
  .ai-card-head h4 { font-size: 14px; font-weight: 600; }
  .ai-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ai-tag {
    font-size: 12px; color: var(--text-secondary);
    background: rgba(0,0,0,0.04);
    padding: 4px 10px; border-radius: 5px;
    transition: all 0.2s; text-decoration: none; display: inline-block;
  }
  .ai-tag:hover { background: var(--blue); color: #fff; }

  /* ─── Right Sidebar ─── */
  .side {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    z-index: 30;
  }
  .side ul { list-style: none; }
  .side li {
    width: 40px; height: 40px;
    margin-bottom: 2px; position: relative;
  }
  .side .sidebox {
    position: absolute; right: 0; top: 0;
    width: 50px; height: 40px;
    border-radius: 6px 0 0 6px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-right: none;
    display: flex; align-items: center; justify-content: center;
    gap: 4px;
    color: var(--text-secondary); font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    text-decoration: none;
  }
  .side .sidebox:hover {
    width: 90px;
    background: #fff;
    color: var(--text);
  }
  .side .sidebox .s-icon { font-size: 18px; flex-shrink: 0; }
  .side .sidebox .s-label { white-space: nowrap; display: none; }
  .side .sidebox:hover .s-label { display: inline; }

  /* ─── Hero ─── */
  .hero { text-align: center; padding: 40px 0 36px; }
  .hero h1 { font-size: 38px; font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
  .hero h1 em { font-style: normal; background: linear-gradient(135deg,#0071e3,#5e5ce6,#ac39ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero .sub { font-size: 16px; color: var(--text-secondary); margin-bottom: 20px; }
  .hero-stats { display: flex; justify-content: center; gap: 40px; }
  .hero-stat { text-align: center; }
  .hero-stat .n { font-size: 28px; font-weight: 700; background: linear-gradient(135deg,#0071e3,#5e5ce6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-stat .l { font-size: 12px; color: var(--text-secondary); }

  /* ─── Footer ─── */
  footer { text-align: center; padding: 24px; color: var(--text-tertiary); font-size: 11px; border-top: 1px solid #eee; }

  /* ─── Search ─── */
  .search-head { text-align: center; padding: 24px 0 28px; }
  .search-head h2 { font-size: 20px; font-weight: 700; }
  .search-head .q { color: var(--blue); }
  .search-head p { color: var(--text-secondary); font-size: 14px; }
  .empty-state { text-align: center; padding: 80px 0; color: var(--text-secondary); }
  .empty-state .ei { font-size: 48px; margin-bottom: 12px; opacity: 0.2; }

  @media (max-width: 768px) {
    .nav { padding: 0 16px; height: 44px; }
    .nav-search { width: 160px; }
    .cat-bar-inner { padding: 0 12px; }
    .main-wrap { padding: 16px 12px 40px; }
    .hero h1 { font-size: 26px; }
    .hero-stats { gap: 24px; }
    .side { display: none; }
  }
</style>
</head>

  // ─── Section ───
  function buildSection(cat, showAll) {
    var h = '<div class="cat-section" id="cat-' + esc(cat.name) + '">';
    h += '<div class="sec-title"><span class="emoji">' + (cat.emoji||'') + '</span><h3>' + esc(cat.name) + '</h3><span class="desc">' + esc(cat.description||'') + '</span></div>';
    h += '<div class="bookmark-grid">';
    for (var gi=0;gi<cat.groups.length;gi++) {
      var g=cat.groups[gi];
      for (var si=0;si<g.subgroups.length;si++) {
        var sg=g.subgroups[si];
        var showN = showAll ? sg.children.length : Math.min(sg.children.length, 18);
        for (var sj=0;sj<showN;sj++) {
          h += cardHTML(sg.children[sj]);
        }
      }
    }
    h += '</div></div>';
    return h;
  }
