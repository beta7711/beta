<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>贝塔导航</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --border: rgba(0,0,0,0.06);
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
    --tag-bg: #f5f5f7;
    --blue: #0071e3;
    --radius: 10px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
    overflow-x: hidden;
  }
  a { text-decoration:none; color:inherit; }

  .nav {
    position:fixed; top:0; width:100%; z-index:100;
    height:48px;
    background: rgba(29,29,31,0.95);
    backdrop-filter: saturate(180%) blur(20px);
    display:flex; align-items:center;
    padding:0 40px;
  }
  .nav-inner {
    display:flex; align-items:center; justify-content:space-between; width:100%;
  }
  .nav-logo { display:flex; align-items:center; gap:8px; font-size:17px; font-weight:600; color:#fff; }
  .nav-dot { width:6px; height:6px; border-radius:50%; background:var(--blue); }
  .nav-srch {
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.08);
    border-radius:8px; padding:4px 12px; width:220px; transition:all var(--transition);
  }
  .nav-srch:focus-within { background:rgba(255,255,255,0.16); border-color:var(--blue); }
  .nav-srch svg { color:rgba(255,255,255,0.4); flex-shrink:0; width:14px; height:14px; }
  .nav-srch input {
    flex:1; background:none; border:none; color:#fff; font-size:13px;
    padding:5px 0; outline:none; font-family:inherit; caret-color:var(--blue);
  }
  .nav-srch input::placeholder { color:rgba(255,255,255,0.4); }

  .cat-bar {
    position:sticky; top:48px; z-index:50;
    height:50px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center;
    padding:0 40px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .cat-bar::-webkit-scrollbar { height:0; }
  .cat-tab {
    flex-shrink:0;
    padding:14px 16px; font-size:13px; font-weight:400;
    color:var(--text-secondary); cursor:pointer;
    transition:color var(--transition);
    border-bottom:2px solid transparent;
  }
  .cat-tab:hover { color:var(--text); }
  .cat-tab.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }

  .side {
    position:fixed; right:0; top:50%; transform:translateY(-50%); z-index:30;
  }
  .side a {
    display:flex; align-items:center; justify-content:flex-end; gap:6px;
    width:46px; height:38px;
    background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
    border:1px solid var(--border); border-right:none; border-radius:6px 0 0 6px;
    margin-bottom:2px;
    font-size:12px; color:var(--text-secondary); cursor:pointer;
    transition:all 0.2s; overflow:hidden;
    padding-right:10px;
  }
  .side a:hover { width:90px; background:#fff; color:var(--text); }
  .side .s-icon { font-size:16px; flex-shrink:0; }
  .side .s-label { white-space:nowrap; display:none; }
  .side a:hover .s-label { display:inline; }

  .main-wrap { padding:60px 40px 80px; }

  .hero { text-align:center; padding:40px 0 32px; }
  .hero h1 { font-size:36px; font-weight:700; letter-spacing:-0.5px; }
  .hero h1 em { font-style:normal; color:var(--blue); }
  .hero .sub { font-size:15px; color:var(--text-secondary); margin-top:8px; margin-bottom:24px; }
  .hero-stats { display:flex; justify-content:center; gap:48px; }
  .hero-stat { text-align:center; }
  .hero-stat .n { font-size:28px; font-weight:700; color:var(--text); }
  .hero-stat .l { font-size:12px; color:var(--text-tertiary); margin-top:2px; }

  .cat-sect { margin-bottom:48px; scroll-margin-top:110px; }

  .sec-hd {
    display:flex; align-items:center; gap:8px;
    margin-bottom:16px; padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .sec-hd h2 { font-size:18px; font-weight:600; }
  .sec-hd span { font-size:12px; color:var(--text-tertiary); margin-left:4px; }

  .bookmark-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:10px;
  }
  @media (max-width:640px) { .bookmark-grid { grid-template-columns:repeat(3,1fr); gap:8px; } }
  @media (max-width:420px) { .bookmark-grid { grid-template-columns:repeat(2,1fr); } }

  .tool { }
  .tool-head { display:block; }
  .tool-img {
    height:90px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:8px;
    transition:all var(--transition);
  }
  .tool-img:hover {
    box-shadow:0 10px 20px -12px rgba(0,0,0,0.2);
    transform:translateY(-2px);
  }
  .tool-img .tl {
    font-size:28px; font-weight:600;
    background:rgba(255,255,255,0.9); border-radius:6px;
    width:48px; height:48px;
    display:flex; align-items:center; justify-content:center;
    color:#333;
    transition:all var(--transition);
  }
  .tool-img:hover .tl { transform:scale(1.08); }

  .tool-title {
    font-size:12px; font-weight:600; line-height:1.35;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-bottom:2px;
  }
  .tool-body {
    font-size:11px; color:var(--text-tertiary);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .ai-col { margin-bottom:48px; }
  .ai-col-hd {
    display:flex; align-items:center; gap:8px;
    margin-bottom:16px; padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .ai-col-hd h2 { font-size:18px; font-weight:600; }
  .ai-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:10px;
  }
  .ai-card {
    background:#f5f5f7; border-radius:8px;
    padding:16px 16px; transition:background var(--transition);
  }
  .ai-card:hover { background:#eee; }
  .ai-card-hd { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .ai-card-hd h4 { font-size:13px; font-weight:600; }
  .ai-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .ai-tag {
    font-size:11px; color:var(--text-secondary);
    background:rgba(255,255,255,0.8); border-radius:4px;
    padding:3px 8px; transition:all var(--transition);
  }
  .ai-tag:hover { background:var(--blue); color:#fff; }

  .search-hd { text-align:center; padding:20px 0 24px; }
  .search-hd h2 { font-size:20px; font-weight:600; }
  .search-hd .q { color:var(--blue); }
  .search-hd p { font-size:13px; color:var(--text-secondary); }
  .empty { text-align:center; padding:80px 0; color:var(--text-tertiary); }
  .empty .ei { font-size:40px; margin-bottom:12px; opacity:0.3; }
  footer { text-align:center; padding:24px; color:var(--text-tertiary); font-size:11px; border-top:1px solid var(--border); }

  @media (max-width:768px) {
    .nav { padding:0 16px; }
    .nav-srch { width:160px; }
    .cat-bar { padding:0 12px; }
    .main-wrap { padding:40px 16px 60px; }
    .hero h1 { font-size:26px; }
    .hero-stats { gap:24px; }
    .side { display:none; }
  }
</style>
</head>

    activeCategory = name; renderTabs();
    document.getElementById('searchInput').value = ''; renderContent();
    if (name) setTimeout(function(){var e=document.getElementById('cat-'+name);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});},60);
    else window.scrollTo({top:0,behavior:'smooth'});
  }

  var sideList = document.getElementById('sideList');
  function buildSide() {
    if (activeCategory) { sideList.innerHTML = ''; return; }
    var h = '';
    for (var i=0;i<categories.length;i++) {
      var c=categories[i];
      h += '<a href="#cat-'+esc(c.name)+'"><span class="s-icon">'+(c.emoji||'')+'</span><span class="s-label">'+esc(c.name)+'</span></a>';
    }
    sideList.innerHTML = h;
  }

  var mainContent = document.getElementById('mainContent');

  function renderContent() {
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    var h = '', count = 0;

    if (q) {
      var rs = [];
      for (var i=0;i<flatItems.length;i++) {
        var fi=flatItems[i];
        if ((fi.it.name+' '+(fi.it.desc||'')+' '+fi.it.href+' '+fi.cat).toLowerCase().indexOf(q)!==-1) rs.push(fi);
      }
      count = rs.length;
      h += '<div class="search-hd"><h2><span class="q">"'+esc(q)+'"</span></h2><p>'+count+' 个结果</p></div>';
      if (count>0) { h += '<div class="bookmark-grid">'; for (var r=0;r<rs.length;r++) h += cardHTML(rs[r].it); h += '</div>'; }
    } else if (activeCategory) {
      var cat=null;
      for (var cc=0;cc<categories.length;cc++){if(categories[cc].name===activeCategory){cat=categories[cc];break;}}
      if (cat) { count=catTotal(cat); h += buildSection(cat, true); }
    } else {
      h += '<div class="hero"><h1>贝塔<em>导航</em></h1><p class="sub">'+flatItems.length+' 个精选网站</p>';
      h += '<div class="hero-stats"><div class="hero-stat"><div class="n">'+flatItems.length+'</div><div class="l">网站</div></div><div class="hero-stat"><div class="n">'+categories.length+'</div><div class="l">分类</div></div><div class="hero-stat"><div class="n">'+new Date().getFullYear()+'</div><div class="l">持续更新</div></div></div></div>';
      h += aiColumnHTML();
      count = flatItems.length;
      for (var d=0;d<categories.length;d++) { h += buildSection(categories[d], false); }
    }

    if (typeof buildSide === 'function') { if (!q && !activeCategory) buildSide(); else sideList.innerHTML = ''; }
    if (count===0 && q) { mainContent.innerHTML = '<div class="empty"><div class="ei">🔍</div></div>'; return; }
    mainContent.innerHTML = h;
  }

  var AI = [
    {i:'🐬',t:'DeepSeek & 模型入门',g:[{n:'Ollama',h:'https://ollama.com/'},{n:'DeepSeek',h:'https://chat.deepseek.com/'},{n:'DeepSeek 平台',h:'https://platform.deepseek.com/'},{n:'入门指南',h:'https://www.waytoagi.com/'},{n:'AI 导航',h:'https://ai-bot.cn/'}]},
    {i:'💻',t:'AI 编程 & API',g:[{n:'Trae',h:'https://www.trae.ai/'},{n:'API 文档',h:'https://platform.openai.com/docs/'},{n:'n8n',h:'https://n8n.io/'}]},
    {i:'🦾',t:'AI Agent',g:[{n:'Coze',h:'https://www.coze.cn/'},{n:'MCP',h:'https://modelcontextprotocol.io/'},{n:'OWL',h:'https://github.com/camel-ai/owl'},{n:'Skills',h:'https://www.waytoagi.com/'}]},
    {i:'🎨',t:'AI 图像 & 视频',g:[{n:'Liblib',h:'https://www.liblib.art/'},{n:'Seedream',h:'https://seeddream.io/'},{n:'AIGC',h:'https://www.bilibili.com/'}]},
    {i:'📊',t:'提示词 & 测评',g:[{n:'提示词库',h:'https://www.aishort.top/'},{n:'模型横评',h:'https://lmarena.ai/'},{n:'工具盘点',h:'https://ai-bot.cn/'}]},
  ];
  function aiColumnHTML() {
    var h = '<div class="ai-col"><div class="ai-col-hd"><h2>AI 探索</h2></div><div class="ai-grid">';
    for (var a=0;a<AI.length;a++) {
      var cd=AI[a];
      h += '<div class="ai-card"><div class="ai-card-hd"><span>'+cd.i+'</span><h4>'+esc(cd.t)+'</h4></div><div class="ai-tags">';
      for (var j=0;j<cd.g.length;j++) h += '<a class="ai-tag" href="'+esc(cd.g[j].h)+'" target="_blank" rel="noopener">'+esc(cd.g[j].n)+'</a>';
      h += '</div></div>';
    }
    return h + '</div></div>';
  }

  function buildSection(cat, showAll) {
    var h = '<div class="cat-sect" id="cat-'+esc(cat.name)+'">';
    h += '<div class="sec-hd"><h2>'+(cat.emoji||'')+' '+esc(cat.name)+'</h2><span>'+catTotal(cat)+'</span></div>';
    h += '<div class="bookmark-grid">';
    for (var gi=0;gi<cat.groups.length;gi++) {
      var g=cat.groups[gi];
      for (var si=0;si<g.subgroups.length;si++) {
        var sg=g.subgroups[si];
        var showN = showAll ? sg.children.length : Math.min(sg.children.length, 24);
        for (var sj=0;sj<showN;sj++) { h += cardHTML(sg.children[sj]); }
      }
    }
    h += '</div></div>';
    return h;
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    if (this.value.trim()) { activeCategory=null; renderTabs(); }
    renderContent();
  });

  renderTabs();
  renderContent();
})();
</script>
</body>
</html>
